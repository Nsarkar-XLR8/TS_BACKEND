name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # ── Install ──
      - name: Install dependencies
        run: npm ci

      # ── Security: Dependency audit ──
      - name: Security audit (npm audit)
        run: npm audit --audit-level=high || true
        # `|| true` prevents CI from failing on known/accepted vulnerabilities.
        # Remove `|| true` for strict enforcement.

      # ── Type checking ──
      - name: TypeScript typecheck
        run: npm run typecheck

      # ── Linting ──
      - name: Lint code
        run: npm run lint

      # ── Unit & integration tests ──
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_min_32_characters_long
          JWT_EXPIRES_IN: 7d
          JWT_REFRESH_TOKEN_SECRET: ci_test_refresh_secret_min_32_chars
          JWT_REFRESH_EXPIRES_IN: 30d
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test

      # ── API contract validation ──
      - name: Export OpenAPI spec
        run: npm run export:openapi
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_min_32_characters_long
          JWT_EXPIRES_IN: 7d
          JWT_REFRESH_TOKEN_SECRET: ci_test_refresh_secret_min_32_chars
          JWT_REFRESH_EXPIRES_IN: 30d
          CLOUDINARY_CLOUD_NAME: test
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test

      - name: Lint OpenAPI spec (Spectral)
        run: npm run lint:api
