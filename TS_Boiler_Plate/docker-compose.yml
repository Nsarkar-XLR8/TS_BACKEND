version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URL=mongodb://mongo:27017/ts_boilerplate
      - JWT_SECRET=dev_secret_change_me_in_production_min_32_chars
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_TOKEN_SECRET=dev_refresh_secret_change_me_too
      - JWT_REFRESH_EXPIRES_IN=30d
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
      - TRUST_PROXY=false
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  worker-bullmq:
    build: .
    environment:
      - NODE_ENV=development
      - DB_TYPE=mongodb
      - MONGODB_URL=mongodb://mongo:27017/ts_boilerplate
      - JWT_SECRET=dev_secret_change_me_in_production_min_32_chars
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_TOKEN_SECRET=dev_refresh_secret_change_me_too
      - JWT_REFRESH_EXPIRES_IN=30d
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
      - REDIS_URL=redis://redis:6379
      - BULLMQ_ENABLED=true
      - KAFKA_ENABLED=true
      - RABBITMQ_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run worker:bullmq

  worker-kafka:
    build: .
    environment:
      - NODE_ENV=development
      - DB_TYPE=mongodb
      - MONGODB_URL=mongodb://mongo:27017/ts_boilerplate
      - JWT_SECRET=dev_secret_change_me_in_production_min_32_chars
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_TOKEN_SECRET=dev_refresh_secret_change_me_too
      - JWT_REFRESH_EXPIRES_IN=30d
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
      - REDIS_URL=redis://redis:6379
      - BULLMQ_ENABLED=true
      - KAFKA_ENABLED=true
      - RABBITMQ_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - kafka
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run worker:kafka

  worker-rabbitmq:
    build: .
    environment:
      - NODE_ENV=development
      - DB_TYPE=mongodb
      - MONGODB_URL=mongodb://mongo:27017/ts_boilerplate
      - JWT_SECRET=dev_secret_change_me_in_production_min_32_chars
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_TOKEN_SECRET=dev_refresh_secret_change_me_too
      - JWT_REFRESH_EXPIRES_IN=30d
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
      - REDIS_URL=redis://redis:6379
      - BULLMQ_ENABLED=true
      - KAFKA_ENABLED=true
      - RABBITMQ_ENABLED=true
      - KAFKA_BROKERS=kafka:29092
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      - mongo
      - redis
      - rabbitmq
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run worker:rabbitmq

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
