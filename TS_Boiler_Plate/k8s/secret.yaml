# IMPORTANT: Replace base64 placeholders with real values before applying.
# Generate base64: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: ts-boilerplate
type: Opaque
data:
  MONGODB_URL: CHANGEME_BASE64_ENCODED
  JWT_SECRET: CHANGEME_BASE64_ENCODED
  JWT_EXPIRES_IN: N2Q=
  JWT_REFRESH_TOKEN_SECRET: CHANGEME_BASE64_ENCODED
  JWT_REFRESH_EXPIRES_IN: MzBk
  CLOUDINARY_CLOUD_NAME: CHANGEME_BASE64_ENCODED
  CLOUDINARY_API_KEY: CHANGEME_BASE64_ENCODED
  CLOUDINARY_API_SECRET: CHANGEME_BASE64_ENCODED
  REDIS_URL: CHANGEME_BASE64_ENCODED
  STRIPE_SECRET_KEY: CHANGEME_BASE64_ENCODED
  STRIPE_WEBHOOK_ADMIN_SECRET: CHANGEME_BASE64_ENCODED
